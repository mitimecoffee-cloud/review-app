<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f7f3ff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:20px;padding:32px 24px;text-align:center;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(168,85,247,.15)}
h2{font-size:18px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
p{font-size:13px;color:#888;margin-bottom:24px}
#qr{margin:0 auto 20px;display:block}
.url{font-size:12px;color:#a855f7;background:#faf5ff;padding:8px 12px;border-radius:8px;word-break:break-all;margin-bottom:20px}
.dl-btn{background:linear-gradient(135deg,#ff6b9d,#a855f7);color:#fff;border:none;padding:13px 32px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:.2s}
.dl-btn:hover{opacity:.9}
.hint{font-size:12px;color:#aaa;margin-top:12px}
</style>
</head>
<body>
<div class="card">
  <h2>你的 QR Code ✨</h2>
  <p>客人扫码即可开始生成 Review</p>
  <canvas id="qr"></canvas>
  <div class="url">https://review-app-blond-one.vercel.app/</div>
  <button class="dl-btn" onclick="download()">⬇️ 下载 QR Code</button>
  <div class="hint">建议打印后放在收银台或桌面上</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const url="https://review-app-blond-one.vercel.app/";
new QRCode(document.getElementById("qr"),{
  text:url,
  width:220,
  height:220,
  colorDark:"#a855f7",
  colorLight:"#ffffff",
  correctLevel:QRCode.CorrectLevel.H
});

function download(){
  setTimeout(()=>{
    const canvas=document.querySelector("#qr canvas");
    if(!canvas)return;
    const a=document.createElement("a");
    a.download="review-qrcode.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
  },300);
}
</script>
</body>
</html>
